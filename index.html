<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Allo Dakar</title><script src="https://unpkg.com/react@18/umd/react.production.min.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0f1e;font-family:'Sora',sans-serif}input,select{outline:none;border:none;background:none;color:#f0f4ff;font-family:'Sora',sans-serif;width:100%}input::placeholder{color:#445}select option{background:#151c35;color:#f0f4ff}@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}@keyframes toastIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}.card{animation:fadeUp 0.4s ease forwards}.btn-primary{background:linear-gradient(135deg,#f97316,#f59e0b);border:none;color:white;padding:14px 24px;border-radius:14px;font-family:'Sora',sans-serif;font-weight:700;font-size:15px;cursor:pointer;width:100%;transition:all 0.2s}.btn-secondary{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#c8d0f0;padding:10px 18px;border-radius:10px;font-family:'Sora',sans-serif;font-weight:600;font-size:13px;cursor:pointer}.field{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 16px;transition:border 0.2s}.field:focus-within{border-color:#f97316}.field label{display:block;font-size:10px;font-weight:600;color:#7891b0;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}.route-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;margin-bottom:10px;transition:all 0.2s}.depart-btn{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.3);color:#fdba74;padding:7px 14px;border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin:4px}.tab-btn{padding:8px 20px;border-radius:10px;border:none;font-family:'Sora',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.2s}.res-row{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;margin-bottom:8px}.pay-card{border-radius:14px;padding:14px 18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px;margin-bottom:10px}</style></head><body><div id="root"></div><script type="text/babel">
const{useState}=React;
const ROUTES=[{id:1,from:"Dakar",to:"Thiès",price:5000,duration:"1h00",departs:["06:00","08:00","10:00","14:00","17:00"]}];
const INIT=[{id:"RES-001",client:"Oumar Diallo",phone:"77 123 45 67",from:"Dakar",to:"Thiès",date:"2026-05-05",depart:"08:00",seats:2,price:10000,status:"confirmée",payment:"Orange Money"},{id:"RES-002",client:"Aïssatou Ndiaye",phone:"78 234 56 78",from:"Dakar",to:"Thiès",date:"2026-05-06",depart:"10:00",seats:1,price:5000,status:"en attente",payment:"Wave"}];
const CITIES=[...new Set(ROUTES.flatMap(r=>[r.from,r.to]))].sort();
const PM=[{id:"orange",label:"Orange Money",color:"#FF6B00",bg:"rgba(255,107,0,0.12)",icon:"🟠",hint:"77/78 XXX XX XX"},{id:"wave",label:"Wave",color:"#00BFFF",bg:"rgba(0,191,255,0.1)",icon:"🔵",hint:"70 XXX XX XX"}];
function App(){
const[view,setView]=useState("client");
const[step,setStep]=useState(1);
const[res,setRes]=useState(INIT);
const[from,setFrom]=useState("");const[to,setTo]=useState("");
const[date,setDate]=useState("");const[seats,setSeats]=useState(1);
const[found,setFound]=useState([]);const[route,setRoute]=useState(null);
const[depart,setDepart]=useState("");
const[name,setName]=useState("");const[phone,setPhone]=useState("");
const[pm,setPm]=useState("");const[pmPhone,setPmPhone]=useState("");
const[filter,setFilter]=useState("toutes");
const[toast,setToast]=useState(null);
const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000)};
const search=()=>{if(!from||!to||!date)return showToast("Remplissez tous les champs","error");if(from===to)return showToast("Départ et arrivée identiques","error");const r=ROUTES.filter(r=>r.from===from&&r.to===to);if(!r.length)return showToast("Aucun trajet disponible","error");setFound(r);setStep(2)};
const book=()=>{if(!name||!phone)return showToast("Nom et téléphone requis","error");if(!pm)return showToast("Choisissez un paiement","error");if(!pmPhone)return showToast("Entrez votre numéro","error");const n={id:`RES-${String(res.length+1).padStart(3,"0")}`,client:name,phone,from:route.from,to:route.to,date,depart,seats,price:route.price*seats,status:"en attente",payment:pm};setRes(p=>[n,...p]);setStep(4)};
const reset=()=>{setStep(1);setFrom("");setTo("");setDate("");setSeats(1);setFound([]);setRoute(null);setDepart("");setName("");setPhone("");setPm("");setPmPhone("")};
const sc=s=>s==="confirmée"?"#22c55e":s==="annulée"?"#ef4444":"#f59e0b";
const pc=p=>p==="Orange Money"?"#FF6B00":"#00BFFF";
const selPm=PM.find(p=>p.label===pm);
const filtered=filter==="toutes"?res:res.filter(r=>r.status===filter);
const revenue=res.filter(r=>r.status==="confirmée").reduce((a,r)=>a+r.price,0);
return(<div style={{fontFamily:"'Sora',sans-serif",minHeight:"100vh",background:"#0a0f1e",color:"#f0f4ff",display:"flex",flexDirection:"column",alignItems:"center"}}>
{toast&&<div style={{position:"fixed",top:20,right:20,zIndex:9999,background:toast.type==="error"?"#ef4444":"#22c55e",color:"white",padding:"12px 20px",borderRadius:12,fontWeight:600,fontSize:14,animation:"toastIn 0.3s ease"}}>{toast.msg}</div>}
<div style={{width:"100%",maxWidth:430,padding:"20px 20px 0"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
<div><div style={{fontSize:22,fontWeight:800}}>🚌 <span style={{background:"linear-gradient(135deg,#f97316,#f59e0b)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Allo Dakar</span></div><div style={{fontSize:11,color:"#556",marginTop:2}}>by <span style={{color:"#f59e0b",fontWeight:600}}>Miya Group</span></div></div>
<div style={{display:"flex",gap:8}}><button className="tab-btn" onClick={()=>{setView("client");reset()}} style={{background:view==="client"?"linear-gradient(135deg,#f97316,#f59e0b)":"rgba(255,255,255,0.07)",color:view==="client"?"white":"#aaa"}}>Client</button><button className="tab-btn" onClick={()=>setView("admin")} style={{background:view==="admin"?"linear-gradient(135deg,#f97316,#f59e0b)":"rgba(255,255,255,0.07)",color:view==="admin"?"white":"#aaa"}}>Admin</button></div>
</div></div>
{view==="client"&&<div style={{width:"100%",maxWidth:430,padding:"0 20px 40px",flex:1}}>
{step===1&&<div className="card"><div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Réservez votre voyage</div><div style={{fontSize:13,color:"#778",marginBottom:24}}>Partout au Sénégal 🇸🇳</div>
<div style={{display:"grid",gap:12}}>
<div className="field"><label>Ville de départ</label><select value={from} onChange={e=>setFrom(e.target.value)} style={{fontSize:15,fontWeight:600}}><option value="">Choisir...</option>{CITIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
<div style={{display:"flex",justifyContent:"center"}}><div onClick={()=>{const t=from;setFrom(to);setTo(t)}} style={{width:36,height:36,borderRadius:"50%",background:"rgba(249,115,22,0.15)",border:"1px solid rgba(249,115,22,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer"}}>⇅</div></div>
<div className="field"><label>Ville d'arrivée</label><select value={to} onChange={e=>setTo(e.target.value)} style={{fontSize:15,fontWeight:600}}><option value="">Choisir...</option>{CITIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
<div className="field"><label>Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} min={new Date().toISOString().split("T")[0]} style={{fontSize:15,fontWeight:600}}/></div>
<div className="field"><label>Places</label><div style={{display:"flex",alignItems:"center",gap:16}}><button onClick={()=>setSeats(s=>Math.max(1,s-1))} style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.1)",border:"none",color:"white",fontSize:18,cursor:"pointer"}}>−</button><span style={{fontSize:20,fontWeight:700}}>{seats}</span><button onClick={()=>setSeats(s=>Math.min(8,s+1))} style={{width:30,height:30,borderRadius:"50%",background:"rgba(249,115,22,0.3)",border:"none",color:"white",fontSize:18,cursor:"pointer"}}>+</button></div></div>
</div><div style={{marginTop:24}}><button className="btn-primary" onClick={search}>Rechercher →</button></div></div>}
{step===2&&<div className="card"><button className="btn-secondary" onClick={()=>setStep(1)} style={{marginBottom:20}}>← Retour</button><div style={{fontSize:18,fontWeight:700,marginBottom:4}}>{from} → {to}</div><div style={{fontSize:12,color:"#778",marginBottom:20}}>{new Date(date).toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})} · {seats} place{seats>1?"s":""}</div>
{found.map(r=><div key={r.id} className="route-card"><div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><div><div style={{fontSize:15,fontWeight:700}}>{r.from} → {r.to}</div><div style={{fontSize:12,color:"#778"}}>⏱ {r.duration}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:800,color:"#fb923c"}}>{(r.price*seats).toLocaleString()} FCFA</div><div style={{fontSize:11,color:"#556"}}>{r.price.toLocaleString()} FCFA/pers.</div></div></div><div style={{fontSize:12,color:"#778",marginBottom:8}}>Choisir un horaire :</div><div style={{display:"flex",flexWrap:"wrap"}}>{r.departs.map(d=><button key={d} className="depart-btn" onClick={()=>{setRoute(r);setDepart(d);setStep(3)}}>🕐 {d}</button>)}</div></div>)}
</div>}
{step===3&&<div className="card"><button className="btn-secondary" onClick={()=>setStep(2)} style={{marginBottom:20}}>← Retour</button>
<div style={{background:"linear-gradient(135deg,rgba(249,115,22,0.12),rgba(245,158,11,0.08))",border:"1px solid rgba(249,115,22,0.25)",borderRadius:14,padding:16,marginBottom:24}}><div style={{fontSize:16,fontWeight:700}}>{route.from} → {route.to}</div><div style={{display:"flex",gap:14,marginTop:8,fontSize:13,color:"#c0a080",flexWrap:"wrap"}}><span>📅 {new Date(date).toLocaleDateString("fr-FR")}</span><span>🕐 {depart}</span><span>👥 {seats} place{seats>1?"s":""}</span></div><div style={{fontSize:22,fontWeight:800,color:"#fb923c",marginTop:8}}>{(route.price*seats).toLocaleString()} FCFA</div></div>
<div style={{fontSize:13,fontWeight:700,marginBottom:12,color:"#d0c0b0",textTransform:"uppercase"}}>👤 Vos informations</div>
<div style={{display:"grid",gap:12,marginBottom:24}}><div className="field"><label>Nom complet *</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Ex: Oumar Diallo" style={{fontSize:15,fontWeight:600,marginTop:2}}/></div><div className="field"><label>Téléphone *</label><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="77 123 45 67" type="tel" style={{fontSize:15,fontWeight:600,marginTop:2}}/></div></div>
<div style={{fontSize:13,fontWeight:700,marginBottom:12,color:"#d0c0b0",textTransform:"uppercase"}}>💳 Mode de paiement</div>
{PM.map(p=><div key={p.id} className="pay-card" onClick={()=>{setPm(p.label);setPmPhone("")}} style={{background:pm===p.label?p.bg:"rgba(255,255,255,0.04)",border:`2px solid ${pm===p.label?p.color:"rgba(255,255,255,0.08)"}`}}><div style={{fontSize:30}}>{p.icon}</div><div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:pm===p.label?p.color:"#e0e8ff"}}>{p.label}</div><div style={{fontSize:11,color:"#778"}}>Paiement mobile sécurisé</div></div><div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${pm===p.label?p.color:"#445"}`,background:pm===p.label?p.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"white"}}>{pm===p.label?"✓":""}</div></div>)}
{pm&&selPm&&<><div style={{background:selPm.bg,border:`1px solid ${selPm.color}55`,borderRadius:12,padding:"14px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:14}}><div style={{fontSize:28}}>{selPm.icon}</div><div><div style={{fontSize:10,color:"#778",textTransform:"uppercase",letterSpacing:"0.8px",fontWeight:600}}>Envoyez le paiement au</div><div style={{fontSize:22,fontWeight:800,color:selPm.color,letterSpacing:"1px",marginTop:3}}>77 591 91 00</div><div style={{fontSize:11,color:"#a0a8c0",marginTop:3}}>Nom : <span style={{color:"#f59e0b",fontWeight:700}}>Miya Group</span></div></div></div><div className="field" style={{marginBottom:24,borderColor:selPm.color+"66"}}><label>Votre numéro {pm} *</label><input value={pmPhone} onChange={e=>setPmPhone(e.target.value)} placeholder={selPm.hint} type="tel" style={{fontSize:15,fontWeight:600,marginTop:2}}/></div></>}
<button className="btn-primary" onClick={book}>Payer et Réserver {pm?`via ${pm}`:""} ✓</button></div>}
{step===4&&<div className="card" style={{textAlign:"center"}}><div style={{fontSize:64,marginBottom:16,animation:"pulse 1s ease 1"}}>✅</div><div style={{fontSize:22,fontWeight:800,marginBottom:8}}>Réservation envoyée !</div><div style={{fontSize:14,color:"#778",marginBottom:24}}>Vous serez contacté pour confirmer.</div>
<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,marginBottom:16,textAlign:"left"}}>
{[["🆔","ID",res[0]?.id],["👤","Nom",name],["📍","Trajet",`${route?.from} → ${route?.to}`],["📅","Date",new Date(date).toLocaleDateString("fr-FR")],["🕐","Départ",depart],["👥","Places",`${seats} place${seats>1?"s":""}`],["💰","Total",`${(route?.price*seats)?.toLocaleString()} FCFA`],["💳","Paiement",pm]].map(([i,k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}><span style={{color:"#778"}}>{i} {k}</span><span style={{fontWeight:600,color:k==="Paiement"?pc(v):"#f0f4ff"}}>{v}</span></div>)}
</div>
<div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:12,padding:12,marginBottom:24,fontSize:13,color:"#fbbf24"}}>⏳ En attente de confirmation</div>
<button className="btn-primary" onClick={reset}>Nouvelle réservation</button></div>}
</div>}
{view==="admin"&&<div style={{width:"100%",maxWidth:430,padding:"0 20px 40px"}}><div className="card">
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
{[{l:"Total",v:res.length,c:"#fb923c"},{l:"Confirmées",v:res.filter(r=>r.status==="confirmée").length,c:"#22c55e"},{l:"Revenus",v:`${(revenue/1000).toFixed(0)}k`,c:"#f59e0b"}].map(s=><div key={s.l} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"12px 10px",textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:11,color:"#556",marginTop:3}}>{s.l}</div></div>)}
</div>
<div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
{["toutes","en attente","confirmée","annulée"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"7px 14px",borderRadius:8,border:"1px solid",borderColor:filter===f?"#f97316":"rgba(255,255,255,0.1)",background:filter===f?"rgba(249,115,22,0.15)":"transparent",color:filter===f?"#fb923c":"#778",fontSize:12,fontFamily:"Sora,sans-serif",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{f.charAt(0).toUpperCase()+f.slice(1)} <span style={{background:"rgba(255,255,255,0.1)",padding:"1px 6px",borderRadius:10,fontSize:11}}>{f==="toutes"?res.length:res.filter(r=>r.status===f).length}</span></button>)}
</div>
{filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#556"}}>Aucune réservation</div>}
{filtered.map(r=><div key={r.id} className="res-row">
<div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div><div style={{fontSize:14,fontWeight:700}}>{r.client}</div><div style={{fontSize:12,color:"#778"}}>{r.phone}</div></div>
<div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}><div style={{background:`${sc(r.status)}22`,border:`1px solid ${sc(r.status)}44`,color:sc(r.status),padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700}}>{r.status}</div>{r.payment&&<div style={{background:`${pc(r.payment)}18`,border:`1px solid ${pc(r.payment)}33`,color:pc(r.payment),padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:700}}>{r.payment}</div>}</div></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
{[["📍",`${r.from}→${r.to}`],["📅",new Date(r.date).toLocaleDateString("fr-FR")],["🕐",r.depart],["👥",`${r.seats}p`],["💰",`${r.price.toLocaleString()} FCFA`],["🆔",r.id]].map(([i,v])=><div key={`${r.id}-${v}`} style={{fontSize:12,color:"#a0b0d0"}}>{i} {v}</div>)}
</div>
<div style={{display:"flex",gap:8}}>
{r.status!=="confirmée"&&<button onClick={()=>setRes(p=>p.map(x=>x.id===r.id?{...x,status:"confirmée"}:x))} style={{flex:1,padding:"8px 0",borderRadius:8,border:"1px solid rgba(34,197,94,0.4)",background:"rgba(34,197,94,0.1)",color:"#22c55e",fontSize:12,fontFamily:"Sora,sans-serif",fontWeight:700,cursor:"pointer"}}>✓ Confirmer</button>}
{r.status!=="annulée"&&<button onClick={()=>setRes(p=>p.map(x=>x.id===r.id?{...x,status:"annulée"}:x))} style={{flex:1,padding:"8px 0",borderRadius:8,border:"1px solid rgba(245,158,11,0.4)",background:"rgba(245,158,11,0.1)",color:"#f59e0b",fontSize:12,fontFamily:"Sora,sans-serif",fontWeight:700,cursor:"pointer"}}>✗ Annuler</button>}
<button onClick={()=>setRes(p=>p.filter(x=>x.id!==r.id))} style={{padding:"8px 12px",borderRadius:8,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#ef4444",fontSize:14,cursor:"pointer"}}>🗑</button>
</div></div>)}
</div></div>}
</div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
